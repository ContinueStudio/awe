<!doctype html>
<html lang="zh-CN" class="light">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - AWE</title>
    <style id="theme-vars">
/* AWE Design System — Brand CSS (PRD §9.2 shadcn/ui 白底黑字) */
:root {
  /* Background */
  --bg: #ffffff;
  --bg-sidebar: #f8fafc;
  --bg-hover: #f1f5f9;
  --bg-selected: #e2e8f0;
  --bg-subtle: #f8fafc;
  --bg-canvas: #f8fafc;
  
  /* Text */
  --text: #020617;
  --text-2: #334155;
  --text-3: #64748b;
  --text-4: #94a3b8;
  --text-placeholder: #cbd5e1;
  
  /* Border */
  --border: #e2e8f0;
  --border-2: #cbd5e1;
  --border-hover: #cbd5e1;
  
  /* Status */
  --success: #22c55e;
  --warning: #eab308;
  --danger: #ef4444;
  --danger-hover: #dc2626;
  
  /* Primary (Brand Blue) */
  --primary: #3b82f6;
  --primary-hover: #2563eb;
  --primary-fg: #ffffff;
  --primary-light: #eff6ff;
  --primary-ring: rgba(59, 130, 246, 0.25);
  
  /* Shadows */
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.08), 0 1px 2px -1px rgb(0 0 0 / 0.06);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.06), 0 2px 4px -2px rgb(0 0 0 / 0.05);
  --shadow-float: 0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.05);
  --shadow-toolbar: 0 4px 12px rgb(15 23 42 / 0.06);
  --shadow-panel: 0 12px 24px -6px rgb(15 23 42 / 0.10), 0 4px 8px -2px rgb(15 23 42 / 0.04);
  
  /* Node Colors */
  --node-emerald: #10b981;
  --node-blue: #3b82f6;
  --node-amber: #f59e0b;
  --node-sky: #0ea5e9;
  --node-rose: #f43f5e;
  --node-slate: #475569;
  --node-violet: #8b5cf6;
  --node-orange: #f97316;
  
  /* Radius */
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --radius-xl: 10px;
  --radius-2xl: 12px;
}

/* Typography */
.font-brand {
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.font-mono {
  font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <style type="text/tailwindcss">
    @theme inline {
      --color-background: var(--bg, #ffffff);
      --color-foreground: var(--text, #020617);
      --color-primary: var(--primary, #3b82f6);
      --color-primary-foreground: var(--primary-fg, #ffffff);
      --color-muted: var(--bg-hover, #f1f5f9);
      --color-muted-foreground: var(--text-3, #64748b);
      --color-border: var(--border, #e2e8f0);
      --color-card: var(--bg, #ffffff);
      --color-card-foreground: var(--text, #020617);
      --color-accent: var(--bg-hover, #f1f5f9);
      --color-accent-foreground: var(--text, #020617);
      --color-destructive: var(--danger, #ef4444);
      --color-destructive-foreground: var(--primary-fg, #ffffff);
      --color-sidebar: var(--bg-sidebar, #f8fafc);
      --color-sidebar-foreground: var(--text, #020617);
    }
    </style>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  
  @layer base {
    body { background: var(--node-background); color: var(--node-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
  <body>
    <div class="app">
      <!-- Titlebar -->
      <div class="titlebar">
        <span class="titlebar__title">AWE - 智能体工作流引擎</span>
        <div class="titlebar__traffic">
          <div class="titlebar__dot"></div>
          <div class="titlebar__dot"></div>
          <div class="titlebar__dot"></div>
        </div>
      </div>

      <div class="body-row">
        <!-- Sidebar -->
        <div class="sidebar">
          <div class="sidebar__logo">
            <!-- Inline SVG logo -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
            AWE
          </div>
          <div class="sidebar__nav">
            <!-- Home -->
            <a class="sidebar__item" href="home.html">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/>
                <path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              </svg>
              首页
            </a>
            <!-- Editor -->
            <a class="sidebar__item" href="editor.html">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
                <path d="m15 5 4 4"/>
              </svg>
              编辑器
            </a>
            <!-- Nodes -->
            <a class="sidebar__item" href="nodes.html">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 18h10"/>
                <path d="M7 6h10"/>
                <rect x="3" y="10" width="4" height="4" rx="1"/>
                <rect x="17" y="10" width="4" height="4" rx="1"/>
              </svg>
              节点
            </a>
            <!-- History -->
            <a class="sidebar__item" href="history.html">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                <path d="M3 3v5h5"/>
                <path d="M12 7v5l4 2"/>
              </svg>
              历史记录
            </a>
            <!-- Settings (active) -->
            <a class="sidebar__item sidebar__item--active" href="settings.html">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              设置
            </a>
          </div>
        </div>

        <!-- Content -->
        <div class="content">
          <!-- Page header -->
          <div class="page-header">
            <span class="page-header__title">设置</span>
            <span class="page-header__subtitle">系统配置与连接信息</span>
          </div>

          <!-- Settings body -->
          <div class="settings-body">
            <!-- Card 1: 后端连接 -->
            <div class="card">
              <div class="card__header">后端连接</div>
              <div class="card__body">
                <div class="card__grid">
                  <div class="card__label">服务地址</div>
                  <div class="card__value--mono">http://127.0.0.1:8765</div>

                  <div class="card__label">健康状态</div>
                  <div class="card__value">
                    <span class="status">
                      <span class="status__dot"></span>
                      <span class="status__text">在线</span>
                    </span>
                  </div>

                  <div class="card__label">后端版本</div>
                  <div class="card__value--mono">1.0.0</div>
                </div>
              </div>
            </div>

            <!-- Card 2: 前端 -->
            <div class="card">
              <div class="card__header">前端</div>
              <div class="card__body">
                <div class="card__grid">
                  <div class="card__label">前端版本</div>
                  <div class="card__value--mono">v0.3.6</div>

                  <div class="card__label">UI 规范</div>
                  <div class="card__value">shadcn/ui 白底黑字（PRD v2.11+）</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background: var(--bg-canvas, #f8fafc);
        color: var(--text, #020617);
        height: 100vh;
        overflow: hidden;
      }

      /* === Layout Shell === */
      .app { display: flex; flex-direction: column; height: 100vh; }

      /* Titlebar */
      .titlebar {
        height: 32px; min-height: 32px;
        background: var(--bg-sidebar, #f8fafc);
        border-bottom: 1px solid var(--border, #e2e8f0);
        display: flex; align-items: center;
        padding: 0 12px;
        -webkit-app-region: drag;
      }
      .titlebar__title {
        font-size: 12px; font-weight: 500;
        color: var(--text-3, #64748b);
        user-select: none;
      }
      .titlebar__traffic {
        margin-left: auto; display: flex; gap: 8px;
      }
      .titlebar__dot {
        width: 12px; height: 12px; border-radius: 50%;
        background: var(--border-2, #cbd5e1);
      }

      /* Body row */
      .body-row { display: flex; flex: 1; overflow: hidden; }

      /* Sidebar */
      .sidebar {
        width: 240px; min-width: 240px;
        background: var(--bg, #ffffff);
        border-right: 1px solid var(--border, #e2e8f0);
        display: flex; flex-direction: column;
        padding: 8px 0;
      }
      .sidebar__logo {
        padding: 12px 16px;
        font-size: 15px; font-weight: 700;
        color: var(--text, #020617);
        letter-spacing: -0.02em;
        border-bottom: 1px solid var(--border, #e2e8f0);
        margin-bottom: 4px;
        display: flex; align-items: center; gap: 8px;
      }
      .sidebar__logo svg { flex-shrink: 0; }
      .sidebar__nav { padding: 4px 8px; flex: 1; }
      .sidebar__item {
        display: flex; align-items: center; gap: 10px;
        padding: 8px 12px; border-radius: var(--radius-md, 6px);
        font-size: 13px; color: var(--text-2, #334155);
        cursor: pointer; transition: all 150ms ease;
        margin-bottom: 2px; text-decoration: none;
      }
      .sidebar__item:hover {
        background: var(--bg-hover, #f1f5f9);
        color: var(--text, #020617);
      }
      .sidebar__item--active {
        background: var(--bg-selected, #e2e8f0) !important;
        color: var(--text, #020617) !important;
        font-weight: 500;
      }
      .sidebar__item svg { flex-shrink: 0; opacity: 0.7; }
      .sidebar__item--active svg { opacity: 1; }

      /* Content */
      .content { flex: 1; overflow-y: auto; background: var(--bg-canvas, #f8fafc); }

      /* Page header */
      .page-header {
        height: 56px; min-height: 56px;
        display: flex; align-items: baseline; gap: 10px;
        padding: 0 24px;
        border-bottom: 1px solid var(--border, #e2e8f0);
        background: var(--bg, #ffffff);
      }
      .page-header__title { font-size: 16px; font-weight: 600; color: var(--text, #020617); }
      .page-header__subtitle { font-size: 11px; color: var(--text-3, #64748b); }

      /* Settings body */
      .settings-body {
        max-width: 720px;
        margin: 0 auto;
        padding: 24px;
      }

      /* Card */
      .card {
        background: var(--bg, #ffffff);
        border: 1px solid var(--border, #e2e8f0);
        border-radius: var(--radius-lg, 8px);
        margin-bottom: 16px;
        box-shadow: var(--shadow-sm, 0 1px 2px 0 rgb(0 0 0 / 0.05));
      }
      .card__header {
        background: var(--bg-subtle, #f8fafc);
        padding: 12px 16px;
        border-bottom: 1px solid var(--border, #e2e8f0);
        border-radius: var(--radius-lg, 8px) var(--radius-lg, 8px) 0 0;
        font-size: 13px; font-weight: 600;
        color: var(--text, #020617);
      }
      .card__body { padding: 12px 16px; }
      .card__grid {
        display: grid;
        grid-template-columns: 160px 1fr;
        row-gap: 12px;
      }
      .card__label {
        font-size: 13px;
        color: var(--text-3, #64748b);
        line-height: 2;
      }
      .card__value {
        font-size: 13px;
        color: var(--text, #020617);
        line-height: 2;
      }
      .card__value--mono {
        font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
        font-size: 13px;
        color: var(--text, #020617);
        line-height: 2;
      }

      /* Status dot */
      .status {
        display: inline-flex; align-items: center; gap: 6px;
        font-size: 13px; line-height: 2;
      }
      .status__dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--success, #22c55e);
        box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
      }
      .status__text { color: var(--success, #22c55e); font-weight: 500; }
    </style>
</body>
</html>
