    <style id="theme-vars">
/* AWE Design System — Brand CSS (PRD §9.2 shadcn/ui 白底黑字) */
:root {
  /* Background */
  --bg: #ffffff;
  --bg-sidebar: #f8fafc;
  --bg-hover: #f1f5f9;
  --bg-selected: #e2e8f0;
  --bg-subtle: #f8fafc;
  --bg-canvas: #f8fafc;
  
  /* Text */
  --text: #020617;
  --text-2: #334155;
  --text-3: #64748b;
  --text-4: #94a3b8;
  --text-placeholder: #cbd5e1;
  
  /* Border */
  --border: #e2e8f0;
  --border-2: #cbd5e1;
  --border-hover: #cbd5e1;
  
  /* Status */
  --success: #22c55e;
  --warning: #eab308;
  --danger: #ef4444;
  --danger-hover: #dc2626;
  
  /* Primary (Brand Blue) */
  --primary: #3b82f6;
  --primary-hover: #2563eb;
  --primary-fg: #ffffff;
  --primary-light: #eff6ff;
  --primary-ring: rgba(59, 130, 246, 0.25);
  
  /* Shadows */
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.08), 0 1px 2px -1px rgb(0 0 0 / 0.06);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.06), 0 2px 4px -2px rgb(0 0 0 / 0.05);
  --shadow-float: 0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.05);
  --shadow-toolbar: 0 4px 12px rgb(15 23 42 / 0.06);
  --shadow-panel: 0 12px 24px -6px rgb(15 23 42 / 0.10), 0 4px 8px -2px rgb(15 23 42 / 0.04);
  
  /* Node Colors */
  --node-emerald: #10b981;
  --node-blue: #3b82f6;
  --node-amber: #f59e0b;
  --node-sky: #0ea5e9;
  --node-rose: #f43f5e;
  --node-slate: #475569;
  --node-violet: #8b5cf6;
  --node-orange: #f97316;
  
  /* Radius */
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --radius-xl: 10px;
  --radius-2xl: 12px;
}

/* Typography */
.font-brand {
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.font-mono {
  font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
}

    <style type="text/tailwindcss">
    @theme inline {
      --color-background: var(--bg, #ffffff);
      --color-foreground: var(--text, #020617);
      --color-primary: var(--primary, #3b82f6);
      --color-primary-foreground: var(--primary-fg, #ffffff);
      --color-muted: var(--bg-hover, #f1f5f9);
      --color-muted-foreground: var(--text-3, #64748b);
      --color-border: var(--border, #e2e8f0);
      --color-card: var(--bg, #ffffff);
      --color-card-foreground: var(--text, #020617);
      --color-accent: var(--bg-hover, #f1f5f9);
      --color-accent-foreground: var(--text, #020617);
      --color-destructive: var(--danger, #ef4444);
      --color-destructive-foreground: var(--primary-fg, #ffffff);
      --color-sidebar: var(--bg-sidebar, #f8fafc);
      --color-sidebar-foreground: var(--text, #020617);
    }
    </style>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">

    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>

        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }

  <script>
    // Context menu toggle
    function toggleMenu(event, menuId) {
      event.stopPropagation();
      const menu = document.getElementById(menuId);
      if (menu) {
        const rect = event.currentTarget.getBoundingClientRect();
        menu.style.top = (rect.bottom + 4) + 'px';
        menu.style.left = Math.min(rect.right - 160, window.innerWidth - 170) + 'px';
      }
    }
    // Close menus on outside click
    document.addEventListener('click', () => {
      document.querySelectorAll('.context-menu').forEach(m => {
        m.style.display = m.style.display === 'none' ? '' : '';
      });
    });
  </script>

    <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
