<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>执行历史 - AWE</title>
    <style id="theme-vars">
/* AWE Design System — Brand CSS (PRD §9.2 shadcn/ui 白底黑字) */
:root {
  /* Background */
  --bg: #ffffff;
  --bg-sidebar: #f8fafc;
  --bg-hover: #f1f5f9;
  --bg-selected: #e2e8f0;
  --bg-subtle: #f8fafc;
  --bg-canvas: #f8fafc;
  
  /* Text */
  --text: #020617;
  --text-2: #334155;
  --text-3: #64748b;
  --text-4: #94a3b8;
  --text-placeholder: #cbd5e1;
  
  /* Border */
  --border: #e2e8f0;
  --border-2: #cbd5e1;
  --border-hover: #cbd5e1;
  
  /* Status */
  --success: #22c55e;
  --warning: #eab308;
  --danger: #ef4444;
  --danger-hover: #dc2626;
  
  /* Primary (Brand Blue) */
  --primary: #3b82f6;
  --primary-hover: #2563eb;
  --primary-fg: #ffffff;
  --primary-light: #eff6ff;
  --primary-ring: rgba(59, 130, 246, 0.25);
  
  /* Shadows */
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.08), 0 1px 2px -1px rgb(0 0 0 / 0.06);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.06), 0 2px 4px -2px rgb(0 0 0 / 0.05);
  --shadow-float: 0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.05);
  --shadow-toolbar: 0 4px 12px rgb(15 23 42 / 0.06);
  --shadow-panel: 0 12px 24px -6px rgb(15 23 42 / 0.10), 0 4px 8px -2px rgb(15 23 42 / 0.04);
  
  /* Node Colors */
  --node-emerald: #10b981;
  --node-blue: #3b82f6;
  --node-amber: #f59e0b;
  --node-sky: #0ea5e9;
  --node-rose: #f43f5e;
  --node-slate: #475569;
  --node-violet: #8b5cf6;
  --node-orange: #f97316;
  
  /* Radius */
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --radius-xl: 10px;
  --radius-2xl: 12px;
}

/* Typography */
.font-brand {
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.font-mono {
  font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <style type="text/tailwindcss">
    @theme inline {
      --color-background: var(--bg, #ffffff);
      --color-foreground: var(--text, #020617);
      --color-primary: var(--primary, #3b82f6);
      --color-primary-foreground: var(--primary-fg, #ffffff);
      --color-muted: var(--bg-hover, #f1f5f9);
      --color-muted-foreground: var(--text-3, #64748b);
      --color-border: var(--border, #e2e8f0);
      --color-card: var(--bg, #ffffff);
      --color-card-foreground: var(--text, #020617);
      --color-accent: var(--bg-hover, #f1f5f9);
      --color-accent-foreground: var(--text, #020617);
      --color-destructive: var(--danger, #ef4444);
      --color-destructive-foreground: var(--primary-fg, #ffffff);
      --color-sidebar: var(--bg-sidebar, #f8fafc);
      --color-sidebar-foreground: var(--text, #020617);
    }
    </style>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  
  @layer base {
    body { background: var(--node-background); color: var(--node-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>

  <!-- Titlebar -->
  <div class="titlebar">
    <div class="titlebar__traffic">
      <div class="titlebar__dot titlebar__dot--close"></div>
      <div class="titlebar__dot titlebar__dot--minimize"></div>
      <div class="titlebar__dot titlebar__dot--maximize"></div>
    </div>
    <div class="titlebar__title">执行历史 - AWE</div>
  </div>

  <!-- App Shell -->
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar__brand">
        <div class="sidebar__logo">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 1L14.9282 5V11L8 15L1.07179 11V5L8 1Z" fill="#ffffff" opacity="0.9"/>
            <path d="M8 5L11.4641 7V11L8 13L4.5359 11V7L8 5Z" fill="#ffffff"/>
          </svg>
        </div>
        <span class="sidebar__app-name">AWE</span>
      </div>

      <nav class="sidebar__nav">
        <div class="sidebar__section">工作台</div>

        <!-- 工作流列表 -->
        <a class="sidebar__item" href="home.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5"/>
          </svg>
          工作流列表
        </a>

        <!-- 执行历史 (active) -->
        <a class="sidebar__item sidebar__item--active" href="history.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          执行历史
        </a>

        <div class="sidebar__section">系统</div>

        <!-- 节点库 -->
        <a class="sidebar__item" href="nodes.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
            <line x1="12" y1="22.08" x2="12" y2="12"/>
          </svg>
          节点库
        </a>

        <!-- 设置 -->
        <a class="sidebar__item" href="settings.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          设置
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <div class="main">
      <div class="main__header">
        <span class="main__title">执行历史</span>
        <span class="main__subtitle">最近 0 条运行记录</span>
      </div>

      <div class="main__body">
        <div class="main__content">
          <!-- Empty State -->
          <div class="empty-state">
            <div class="empty-state__icon">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
            </div>
            <div class="empty-state__heading">还没有执行记录</div>
            <div class="empty-state__desc">
              在工作流列表点击
              <span>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
              </span>
              运行，会在这里生成一条历史
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>


    <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-sidebar);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* ---- Titlebar ---- */
    .titlebar {
      height: 32px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      -webkit-app-region: drag;
      user-select: none;
    }
    .titlebar__traffic {
      display: flex;
      gap: 6px;
      margin-right: 10px;
    }
    .titlebar__dot {
      width: 12px; height: 12px; border-radius: 50%;
    }
    .titlebar__dot--close   { background: #ff5f57; }
    .titlebar__dot--minimize { background: #febc2e; }
    .titlebar__dot--maximize { background: #28c840; }
    .titlebar__title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-3);
      flex: 1;
      text-align: center;
      margin-right: 46px;
    }

    /* ---- App Shell ---- */
    .app {
      display: flex;
      height: calc(100vh - 32px);
    }

    /* ---- Sidebar ---- */
    .sidebar {
      width: 240px;
      min-width: 240px;
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .sidebar__brand {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 16px 12px;
    }
    .sidebar__logo {
      width: 26px; height: 26px;
      border-radius: var(--radius-md);
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
    }
    .sidebar__logo svg { display: block; }
    .sidebar__app-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .sidebar__nav {
      flex: 1;
      padding: 4px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .sidebar__item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: var(--radius-md);
      font-size: 13px;
      color: var(--text-2);
      text-decoration: none;
      transition: background 120ms, color 120ms;
      cursor: pointer;
    }
    .sidebar__item:hover {
      background: var(--bg-hover);
    }
    .sidebar__item--active {
      background: var(--bg-selected);
      color: var(--text);
      font-weight: 500;
    }
    .sidebar__item svg {
      flex-shrink: 0;
      color: var(--text-3);
    }
    .sidebar__item--active svg {
      color: var(--text);
    }
    .sidebar__section {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-4);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 16px 10px 6px;
    }

    /* ---- Main Content ---- */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-sidebar);
      overflow: hidden;
    }
    .main__header {
      height: 56px;
      min-height: 56px;
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .main__title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .main__subtitle {
      font-size: 11px;
      color: var(--text-3);
      font-weight: 400;
    }
    .main__body {
      flex: 1;
      overflow-y: auto;
      display: flex;
      justify-content: center;
      padding: 24px;
    }
    .main__content {
      width: 100%;
      max-width: 1100px;
    }

    /* ---- Empty State ---- */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 60px 40px;
    }
    .empty-state__icon {
      margin-bottom: 16px;
      color: var(--text-placeholder);
    }
    .empty-state__heading {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 6px;
    }
    .empty-state__desc {
      font-size: 13px;
      color: var(--text-4);
      text-align: center;
      line-height: 1.6;
    }
    .empty-state__desc span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px; height: 18px;
      border-radius: 4px;
      background: var(--bg-hover);
      vertical-align: middle;
      margin: 0 2px;
    }
  </style>
</body>
</html>
